[demo]
pg1-path=/var/lib/postgresql/data
pg1-port=5432
pg1-user=postgres

[global]
repo1-path=/backup
repo1-retention-full=7
repo1-retention-diff=14
repo1-bundle=y
repo1-block=y

# 压缩配置
compress-type=zstd
compress-level=3

# 进程配置
process-max=4

# 日志配置
log-level-console=info
log-level-file=debug
log-path=/backup/log

# 网络配置 (如使用远程备份)
# repo1-host=backup-server
# repo1-host-user=pgbackrest

[global:archive-push]
compress-level=3
process-max=2

[global:archive-get]
process-max=4
